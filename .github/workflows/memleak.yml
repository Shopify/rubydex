name: Memleak

on:
  push:
    paths:
      - ".github/workflows/memleak.yml"
      - "rust/**"
      - "ext/**"
  pull_request:
    paths:
      - ".github/workflows/memleak.yml"
      - "rust/**"
      - "ext/**"

jobs:
  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          bundler-cache: true

      - run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Install Rust tools
        run: |
          rustup update --no-self-update stable
          rustup default stable

      - name: Run tests under Valgrind
        run: bundle exec rake ruby_test:valgrind

  sanitizer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [memory, leak, thread]
    name: ${{ matrix.sanitizer }} sanitizer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          bundler-cache: true

      - name: Install Rust tools
        run: |
          rustup update --no-self-update stable
          rustup default stable
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Run tests with ${{ matrix.sanitizer }} sanitizer
        run: SANITIZER=${{ matrix.sanitizer }} bundle exec rake ruby_test
